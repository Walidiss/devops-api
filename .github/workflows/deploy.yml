name: 🚀 Build & Deploy Docker to GHCR + VPS

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/devopsapi

jobs:
  build-and-deploy:
    name: 🐳 Build & Push + 🚀 Deploy
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 📥 1. Récupérer le code
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # 🔐 2. Login GHCR
      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      # 🏗️ 3. Build & Push Docker image
      - name: 🏗️ Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 🚀 4. Déploiement sur VPS
      - name: 🚀 Deploy to VPS
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key \
            -p ${{ secrets.VPS_PORT }} \
            ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} << 'EOF'

            echo "📦 Pull latest image..."
            docker pull ${{ env.IMAGE_NAME }}:latest

            echo "🛑 Stop old container..."
            docker stop devopsapi || true

            echo "🗑️ Remove old container..."
            docker rm devopsapi || true

            echo "🚀 Run new container..."
            docker run -d \
              --name devopsapi \
              --restart unless-stopped \
              -p 8080:8080 \
              ${{ env.IMAGE_NAME }}:latest

          EOF