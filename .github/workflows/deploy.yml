name: 🚀 Build & Deploy Docker to GHCR + K8s
on:
  push:
    branches:
      - main
env:
  REGISTRY: ghcr.io
jobs:
  build-and-deploy:
    name: 🐳 Build & Push + ☸️ Deploy to K8s
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ✅ Calcul du nom d'image en lowercase
      - name: 🔡 Set image name (lowercase)
        run: echo "IMAGE_NAME=ghcr.io/$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')/devopsapi" >> $GITHUB_ENV

      - name: 🔐 Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏗️ Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ✅ Installation de kubectl sur le runner GitHub Actions
      - name: 🔧 Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: ☸️ Deploy to K8s
        run: |
          mkdir -p ~/.kube 
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

          
          # 🔐 Création/mise à jour du secret Slack pour Alertmanager
          kubectl create secret generic alertmanager-slack \
            --from-literal=webhook-url='${{ secrets.SLACK_WEBHOOK_URL }}' \
            --namespace monitoring \
            --dry-run=client -o yaml | kubectl apply -f -
          # Met à jour l'image → K8s fait le rolling update automatiquement
          # tag SHA = chaque déploiement traçable et réversible (kubectl rollout undo)
          kubectl set image deployment/devopsapi \
            devopsapi=${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n production

          # Attend que tous les nouveaux Pods soient Ready avant de valider le job
          kubectl rollout status deployment/devopsapi -n production --timeout=120s
          
      